name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flos
          POSTGRES_PASSWORD: flos
          POSTGRES_DB: fantasy_league_os
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @flos/shared build
      - run: pnpm --filter @flos/league-adapters build
      - run: pnpm --filter @flos/api typecheck
      - run: pnpm --filter @flos/mobile typecheck
        continue-on-error: true
